apply plugin: 'com.android.application'

android {
    namespace 'com.loksewahub.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.loksewahub.app'
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    signingConfigs {
        release {
            storeFile file('loksewahub-keystore.jks')
            storePassword 'loksewahub123'
            keyAlias 'loksewahub'
            keyPassword 'loksewahub123'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
